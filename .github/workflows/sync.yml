name: Sync from silver-palm-tree

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sturdy-bassoon
        uses: actions/checkout@v4

      - name: Run update.sh
        env:
          CI: "true"
        run: bash update.sh

      - name: Push to main
        run: git push https://x-access-token:${{ secrets.BASSOON_PAT }}@github.com/GrabowskiM/sturdy-bassoon.git HEAD:main
