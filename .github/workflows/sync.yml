name: Sync from silver-palm-tree

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sturdy-bassoon
        uses: actions/checkout@v4

      - name: Run update.sh
        env:
          GITHUB_TOKEN: ${{ secrets.BASSOON_PAT }}
          CI: "true"
        run: bash update.sh
