name: Sync from silver-palm-tree

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sturdy-bassoon
        uses: actions/checkout@v4

      - name: Run update.sh
        env:
          CI: "true"
        run: bash update.sh

      - name: Push to main
        run: git push origin HEAD:main
